name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Build Docker image
        run: docker build -t image-capture-calcine:ci .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Check deploy prerequisites
        id: deploy-check
        shell: bash
        run: |
          missing=()
          [[ -n "$DEPLOY_HOST" ]] || missing+=("DEPLOY_HOST")
          [[ -n "$DEPLOY_USER" ]] || missing+=("DEPLOY_USER")
          [[ -n "$DEPLOY_SSH_KEY" ]] || missing+=("DEPLOY_SSH_KEY")
          [[ -n "$DEPLOY_KNOWN_HOSTS" ]] || missing+=("DEPLOY_KNOWN_HOSTS")
          [[ -n "$DEPLOY_PATH" ]] || missing+=("DEPLOY_PATH")

          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf 'missing=%s\n' "${missing[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.deploy-check.outputs.ready == 'true'
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via SSH
        if: steps.deploy-check.outputs.ready == 'true'
        shell: bash
        run: |
          ssh "$DEPLOY_USER@$DEPLOY_HOST" "set -euo pipefail
          cd '$DEPLOY_PATH'
          git pull --ff-only origin main
          docker compose up -d --build --remove-orphans"

      - name: Skip deploy until secrets are configured
        if: steps.deploy-check.outputs.ready != 'true'
        run: |
          echo "Skipping deploy. Missing secrets: ${{ steps.deploy-check.outputs.missing }}"
